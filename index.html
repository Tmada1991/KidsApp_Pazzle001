        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let audioInit = false;

        const initAudio = () => {
            if (!audioInit) {
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                const buffer = audioCtx.createBuffer(1, 1, 22050);
                const source = audioCtx.createBufferSource();
                source.buffer = buffer;
                source.connect(audioCtx.destination);
                source.start(0);
                audioInit = true;
            }
        };

        const playTone = (freq, type, duration, vol = 0.1) => {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (e) {
                console.warn("Audio failed", e);
            }
        };

            const renderShape = (f, s, sw, peClass) => {

                    return <path d={pathData} fill={f} stroke={s} strokeWidth={sw} strokeLinejoin="round" className={peClass} />;
                }
            };

                    {!isSilhouette && renderShape("transparent", "transparent", 40, "pointer-events-auto cursor-pointer")}
                    {/* 実際の描画内容：タッチイベントは上の透明枠に任せる */}
                    {renderShape(fill, stroke, strokeWidth, isSilhouette ? "" : "pointer-events-none")}
                </g>
            );
        };

                <circle cx="-14" cy="-5" r="8" fill="white" />
                <circle cx="-14" cy="-5" r="3" fill="#334155" />
                <circle cx="14" cy="-5" r="8" fill="white" />
                <circle cx="14" cy="-5" r="3" fill="#334155" />
            </g>
        );

        const MiniPreview = ({ pieces }) => (
            <svg viewBox="0 60 400 320" className="w-full h-24 drop-shadow-sm pointer-events-none">
                {pieces.map((p, idx) => (
                    <g key={`${p.id}-${idx}`} transform={`translate(${p.tgtX}, ${p.tgtY}) rotate(${p.tgtRot})`}>
                        <PieceShape piece={p} isSilhouette={true} />
                    </g>
                ))}
            </svg>
        );

        // --- メインコンポーネント ---
        function App() {
            const [gameState, setGameState] = useState('title');
            const [selectedDifficulty, setSelectedDifficulty] = useState(null);
            const [currentStage, setCurrentStage] = useState(null);
            const [pieces, setPieces] = useState([]);
            const [dragState, setDragState] = useState(null);
            const [particles, setParticles] = useState([]);
            const svgRef = useRef(null); // SVGの座標変換用にRefを追加

            const startGame = (stage) => {
                initAudio();
                setCurrentStage(stage);

                const cols = 4;
                const startX = 60;
                const startY = 430;
                const spacingX = 90;
                const spacingY = 90;

                const initPieces = stage.pieces.map((p, index) => {
                    const col = index % cols;
                    const row = Math.floor(index / cols);
                    const initX = startX + col * spacingX;
                    const initY = startY + row * spacingY;
                    return {
                        ...p,
                        locked: false,
                        initX,
                        initY,
                        x: initX,
                        y: initY,
                        rot: Math.floor(Math.random() * 8) * 45
                    };
                });

                setPieces(initPieces);
                setGameState('playing');
                setParticles([]);
            };

            const handleDifficultySelect = (diff) => {
                initAudio();
                setSelectedDifficulty(diff);
                setGameState('stageSelect');
            };

            const backToTitle = () => {
                setGameState('title');
                setSelectedDifficulty(null);
                setCurrentStage(null);
            };

            const backToStageSelect = () => {
                setGameState('stageSelect');
                setCurrentStage(null);
            };

            const handleNextStage = () => {
                const stagesInDiff = STAGES.filter(s => s.difficulty === currentStage.difficulty);
                const currentIndex = stagesInDiff.findIndex(s => s.id === currentStage.id);
                if (currentIndex + 1 < stagesInDiff.length) {
                    startGame(stagesInDiff[currentIndex + 1]);
                } else {
                    backToStageSelect();
                }
            };

            const triggerSnapEffect = (x, y) => {
                const newParticles = Array.from({ length: 6 }).map((_, i) => ({
                    id: Date.now() + i,
                    x, y,
                    angle: (i * 60) * (Math.PI / 180),
                }));
                setParticles(prev => [...prev, ...newParticles]);
                setTimeout(() => {
                    setParticles(prev => prev.filter(p => !newParticles.find(np => np.id === p.id)));
                }, 600);
            };

            // 画面の座標をSVG内の座標(400x600)に正確に変換する関数
            const getSvgPoint = (e) => {
                if (!svgRef.current) return { x: e.clientX, y: e.clientY };
                const svg = svgRef.current;
                const pt = svg.createSVGPoint();
                pt.x = e.clientX;
                pt.y = e.clientY;
                return pt.matrixTransform(svg.getScreenCTM().inverse());
            };

            const handlePointerDown = (e, pieceId) => {
                initAudio();
                if (gameState !== 'playing') return;
                if (dragState) return;

                const piece = pieces.find(p => p.id === pieceId);
                if (piece.locked) return;

                e.target.setPointerCapture(e.pointerId);
                const pt = getSvgPoint(e);
                setDragState({
                    pieceId,
                    pointerId: e.pointerId,
                    startX: pt.x,
                    startY: pt.y,
                    initPieceX: piece.x,
                    initPieceY: piece.y,
                    hasMoved: false
                });
            };

            const handlePointerMove = useCallback((e) => {
                if (!dragState || dragState.pointerId !== e.pointerId) return;

                const pt = getSvgPoint(e);
                const dx = pt.x - dragState.startX;
                const dy = pt.y - dragState.startY;

                if (!dragState.hasMoved && (Math.abs(dx) > 2 || Math.abs(dy) > 2)) {
                    setDragState(prev => prev ? { ...prev, hasMoved: true } : null);
                }

                setPieces(prev => prev.map(p => {
                    if (p.id === dragState.pieceId) {
                        const newX = Math.max(30, Math.min(370, dragState.initPieceX + dx));
                        const newY = Math.max(30, Math.min(570, dragState.initPieceY + dy));
                        return { ...p, x: newX, y: newY };
                    }
                    return p;
                }));
            }, [dragState]);

            const handlePointerUp = useCallback((e) => {
                if (!dragState || dragState.pointerId !== e.pointerId) return;

                const currentPiece = pieces.find(p => p.id === dragState.pieceId);
                let finalRot = currentPiece.rot;

                if (!dragState.hasMoved) {
                    playPop();
                    finalRot = (finalRot + 45) % 360;
                }

                // スナップ判定の閾値を厳しくし、ズレてハマるのを防ぐ (50 -> 25)
                const SNAP_THRESHOLD = 25;
                const BOUNDS_THRESHOLD = 60;
                let finalRotNorm = ((finalRot % 360) + 360) % 360;
                let snappedTarget = null;
                let isInBounds = false;

                const sameShapeTargets = pieces.filter(p =>
                    !p.locked &&
                    p.shape === currentPiece.shape &&
                    p.w === currentPiece.w &&
                    p.h === currentPiece.h
                );

                for (const targetPiece of sameShapeTargets) {
                    const dist = Math.hypot(currentPiece.x - targetPiece.tgtX, currentPiece.y - targetPiece.tgtY);
                    if (dist < SNAP_THRESHOLD) {
                        const targetRotNorm = ((targetPiece.tgtRot % 360) + 360) % 360;
                        let rotMatch = false;

                        if (currentPiece.shape === 'circle') {
                            rotMatch = true;
                        } else if (currentPiece.shape === 'square') {
                            rotMatch = Math.abs(finalRotNorm - targetRotNorm) % 90 === 0;
                        } else if (currentPiece.shape === 'rectangle') {
                            rotMatch = Math.abs(finalRotNorm - targetRotNorm) % 180 === 0;
                        } else {
                            rotMatch = finalRotNorm === targetRotNorm;
                        }

                        if (rotMatch) {
                            snappedTarget = targetPiece;
                            break;
                        }
                    }
                }

                if (!snappedTarget) {
                    for (const targetPiece of pieces) {
                        const dist = Math.hypot(currentPiece.x - targetPiece.tgtX, currentPiece.y - targetPiece.tgtY);
                        if (dist < BOUNDS_THRESHOLD) {
                            isInBounds = true;
                            break;
                        }
                    }
                }

                if (snappedTarget) {
                    playSnap();
                    triggerSnapEffect(snappedTarget.tgtX, snappedTarget.tgtY);

                    setPieces(prev => prev.map(p => {
                        if (p.id === currentPiece.id) {
                            return {
                                ...p,
                                x: snappedTarget.tgtX,
                                y: snappedTarget.tgtY,
                                rot: finalRot,
                                locked: true,
                                tgtX: snappedTarget.tgtX,
                                tgtY: snappedTarget.tgtY,
                                tgtRot: snappedTarget.tgtRot
                            };
                        } else if (p.id === snappedTarget.id) {
                            return {
                                ...p,
                                tgtX: currentPiece.tgtX,
                                tgtY: currentPiece.tgtY,
                                tgtRot: currentPiece.tgtRot
                            };
                        }
                        return p;
                    }));
                } else if (isInBounds) {
                    setPieces(prev => prev.map(p => p.id === dragState.pieceId ? { ...p, rot: finalRot, x: currentPiece.x, y: currentPiece.y } : p));
                } else {
                    setPieces(prev => prev.map(p => p.id === dragState.pieceId ? { ...p, rot: finalRot, x: p.initX, y: p.initY } : p));
                }

                setDragState(null);
                try {
                    e.target.releasePointerCapture(e.pointerId);
                } catch (err) { }
            }, [dragState, pieces]);

            useEffect(() => {
                if (gameState === 'playing' && pieces.length > 0 && pieces.every(p => p.locked)) {
                    setTimeout(() => {
                        playClear();
                        setGameState('cleared');
                    }, 500);
                }
            }, [pieces, gameState]);

            const sortedPieces = [...pieces].sort((a, b) => {
                if (a.locked && !b.locked) return -1;
                if (!a.locked && b.locked) return 1;
                const isAActive = dragState?.pieceId === a.id;
                const isBActive = dragState?.pieceId === b.id;
                if (isAActive && !isBActive) return 1;
                if (!isAActive && isBActive) return -1;
                return 0;
            });

            const availableStages = selectedDifficulty ? STAGES.filter(s => s.difficulty === selectedDifficulty) : [];
            const hasNextStage = currentStage && STAGES.filter(s => s.difficulty === currentStage.difficulty).findIndex(s => s.id === currentStage.id) < STAGES.filter(s => s.difficulty === currentStage.difficulty).length - 1;

            return (
                // 画面全体を覆い、タブレット等の広い画面でもアスペクト比を保って中央に表示させる
                <div className="w-full h-[100dvh] bg-slate-900 md:bg-slate-100 flex justify-center items-center overflow-hidden font-sans select-none touch-none">
                    <div className="w-full h-full max-w-2xl md:max-h-[900px] md:h-auto md:aspect-[2/3] bg-slate-800 relative shadow-2xl flex flex-col md:rounded-2xl overflow-hidden">

                        {/* --- タイトル画面 --- */}
                        {gameState === 'title' && (
                            <div className="flex flex-col items-center justify-center h-full p-6 space-y-8 bg-slate-800">
                                <h1 className="text-4xl md:text-5xl font-black text-white tracking-wider">かたちパズル</h1>
                                <p className="text-slate-300 font-bold text-lg md:text-xl">あそぶ レベル を えらんでね</p>
                                <div className="flex flex-col w-full max-w-sm space-y-4">
                                    {['かんたん', 'ふつう', 'むずかしい'].map(diff => (
                                        <button
                                            key={diff}
                                            onClick={() => handleDifficultySelect(diff)}
                                            className="w-full py-5 rounded-full text-2xl font-bold text-slate-800 shadow-md active:scale-95 transition-transform"
                                            style={{ backgroundColor: DIFFICULTY_COLORS[diff] }}
                                        >
                                            {diff}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* --- ステージ選択画面 --- */}
                        {gameState === 'stageSelect' && (
                            <div className="flex flex-col h-full bg-slate-800">
                                <div className="flex items-center p-4 border-b-4 border-slate-700">
                                    <button onClick={backToTitle} className="px-4 py-2 bg-slate-600 text-white font-bold rounded-full active:scale-95">もどる</button>
                                    <div className="flex-1 text-center text-xl md:text-2xl font-bold truncate mx-2" style={{ color: DIFFICULTY_COLORS[selectedDifficulty] }}>
                                        {selectedDifficulty}
                                    </div>
                                    <div className="w-16"></div>
                                </div>
                                {/* 画面幅が広いときは3列にして見やすくする */}
                                <div className="flex-1 p-6 grid grid-cols-2 sm:grid-cols-3 gap-4 overflow-y-auto content-start">
                                    <div className="col-span-2 sm:col-span-3 text-center text-slate-300 font-bold mb-2">どれを つくる？</div>
                                    {availableStages.map((stage) => (
                                        <button
                                            key={stage.id}
                                            onClick={() => startGame(stage)}
                                            className="flex flex-col items-center justify-center p-4 bg-slate-700 rounded-2xl shadow-sm border-4 active:scale-95 transition-transform"
                                            style={{ borderColor: DIFFICULTY_COLORS[selectedDifficulty] }}
                                        >
                                            <MiniPreview pieces={stage.pieces} />
                                            <span className="mt-2 text-sm font-bold text-white truncate w-full text-center">{stage.theme}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* --- プレイ画面 / クリア画面 --- */}
                        {(gameState === 'playing' || gameState === 'cleared') && (
                            <>
                                <div className="flex justify-between items-center p-4 bg-slate-800 border-b-4 border-slate-700 z-10">
                                    <button
                                        onClick={backToStageSelect}
                                        className="px-4 py-2 bg-slate-600 text-white font-bold rounded-full active:scale-95 flex-shrink-0"
                                    >
                                        もどる
                                    </button>
                                    <div className="text-lg md:text-xl font-bold truncate mx-2 text-center" style={{ color: DIFFICULTY_COLORS[currentStage.difficulty] }}>
                                        {currentStage.theme}
                                    </div>
                                    <button
                                        onClick={() => startGame(currentStage)}
                                        className="px-4 py-2 bg-slate-600 text-white font-bold rounded-full active:scale-95 flex-shrink-0"
                                    >
                                        やりなおす
                                    </button>
                                </div>

                                <div
                                    className="flex-1 relative bg-slate-900"
                                    onPointerMove={handlePointerMove}
                                    onPointerUp={handlePointerUp}
                                    onPointerLeave={handlePointerUp}
                                >
                                    <svg ref={svgRef} viewBox="0 0 400 600" className="w-full h-full absolute top-0 left-0">
                                        <circle cx="200" cy="220" r="160" fill="#ffffff" className="pointer-events-none" opacity="0.15" />
                                        <rect x="0" y="380" width="400" height="220" fill="rgba(255,255,255,0.05)" className="pointer-events-none" />

                                        <g className={gameState === 'cleared' ? 'animate-bounce origin-center' : ''} style={{ transformOrigin: '200px 250px' }}>

                                            <g className="silhouettes-bg pointer-events-none">
                                                {pieces.map((p, idx) => (
                                                    <g key={`tgt-${p.id}-${idx}`} transform={`translate(${p.tgtX}, ${p.tgtY}) rotate(${p.tgtRot})`}>
                                                        <PieceShape piece={p} isSilhouette={true} />
                                                    </g>
                                                ))}
                                            </g>

                                            {pieces.filter(p => p.locked).map(p => (
                                                <g
                                                    key={p.id}
                                                    transform={`translate(${p.x}, ${p.y}) rotate(${p.rot})`}
                                                    onPointerDown={(e) => handlePointerDown(e, p.id)}
                                                    style={{ transition: 'transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)' }}
                                                >
                                                    <PieceShape piece={p} isSilhouette={false} />
                                                    <Eyes />
                                                </g>
                                            ))}

                                            {sortedPieces.filter(p => !p.locked).map(p => {
                                                const isDragging = dragState?.pieceId === p.id;
                                                return (
                                                    <g
                                                        key={p.id}
                                                        transform={`translate(${p.x}, ${p.y}) rotate(${p.rot})`}
                                                        onPointerDown={(e) => handlePointerDown(e, p.id)}
                                                        style={{ transition: isDragging ? 'none' : 'transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)' }}
                                                    >
                                                        <PieceShape piece={p} isSilhouette={false} />
                                                        <Eyes />
                                                    </g>
                                                );
                                            })}
                                        </g>
                                    </svg>

                                    {particles.map(p => (
                                        <div
                                            key={p.id}
                                            className="absolute w-4 h-4 bg-white rounded-full pointer-events-none shadow-lg"
                                            style={{
                                                left: p.x - 8,
                                                top: p.y - 8,
                                                transform: `translate(${Math.cos(p.angle) * 40}px, ${Math.sin(p.angle) * 40}px) scale(0)`,
                                                opacity: 0,
                                                animation: 'pop-particle 0.5s ease-out forwards'
                                            }}
                                        />
                                    ))}

                                    {gameState === 'cleared' && (
                                        <div className="absolute inset-0 bg-slate-900/80 flex flex-col items-center justify-center z-20 backdrop-blur-sm">
                                            <h2 className="text-5xl font-black text-orange-400 mb-8 drop-shadow-lg" style={{ WebkitTextStroke: '1px white' }}>
                                                せいかい！
                                            </h2>
                                            <div className="flex space-x-4 mt-4">
                                                <button
                                                    onClick={backToStageSelect}
                                                    className="px-6 py-4 bg-slate-700 text-white text-xl font-bold rounded-full shadow-md active:scale-95"
                                                >
                                                    もどる
                                                </button>
                                                {hasNextStage ? (
                                                    <button
                                                        onClick={handleNextStage}
                                                        className="px-8 py-4 bg-orange-500 text-white text-2xl font-bold rounded-full shadow-lg active:scale-95 animate-pulse"
                                                    >
                                                        つぎへ
                                                    </button>
                                                ) : (
                                                    <button
                                                        onClick={backToStageSelect}
                                                        className="px-8 py-4 bg-orange-500 text-white text-2xl font-bold rounded-full shadow-lg active:scale-95"
                                                    >
                                                        クリア！
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </>
                        )}
                    </div>

                    <style dangerouslySetInnerHTML={{
                        __html: `
            @keyframes pop-particle {
              0% { transform: translate(0, 0) scale(1); opacity: 1; }
              100% { opacity: 0; }
            }
          `}} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
